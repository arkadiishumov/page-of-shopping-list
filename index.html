<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Добавить товар</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--tg-theme-bg-color, #ffffff);
    color: var(--tg-theme-text-color, #000000);
  }

  body {
    display: flex;
    flex-direction: column;
    padding: 24px 20px;
    min-height: 100vh;
  }

  h1 {
    font-size: 18px;
    font-weight: 600;
    margin-bottom: 20px;
  }

  .input-wrap { margin-bottom: 16px; }

  input[type="text"] {
    width: 100%;
    padding: 14px 16px;
    font-size: 17px;
    border: 2px solid var(--tg-theme-hint-color, #cccccc);
    border-radius: 12px;
    background: var(--tg-theme-secondary-bg-color, #f4f4f5);
    color: var(--tg-theme-text-color, #000000);
    outline: none;
    -webkit-appearance: none;
  }
  input[type="text"]:focus {
    border-color: var(--tg-theme-button-color, #3390ec);
  }
  input[type="text"]::placeholder {
    color: var(--tg-theme-hint-color, #999999);
  }

  button {
    width: 100%;
    padding: 14px;
    font-size: 16px;
    font-weight: 600;
    border: none;
    border-radius: 12px;
    background: var(--tg-theme-button-color, #3390ec);
    color: var(--tg-theme-button-text-color, #ffffff);
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  button:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }
  button:active:not(:disabled) { opacity: 0.85; }

  .hint {
    margin-top: 14px;
    font-size: 13px;
    color: var(--tg-theme-hint-color, #888888);
    text-align: center;
    min-height: 18px;
  }
  .hint.error { color: #e53935; }
  .hint.success { color: #43a047; }
</style>
</head>
<body>

<h1>🛒 Новый товар</h1>

<div class="input-wrap">
  <input
    type="text"
    id="name"
    placeholder="Например: молоко"
    autofocus
    autocomplete="off"
    autocapitalize="sentences"
    maxlength="80"
  >
</div>

<button id="add-btn" disabled>Добавить</button>

<div class="hint" id="hint">Жми «Добавить» — окно закроется автоматически</div>

<script>
  // !!! ВАЖНО: впиши сюда URL твоего бота на Railway (тот самый
  // публичный домен, который Railway даёт под "Networking → Public Networking").
  // Например: https://shopping-bot-production-1234.up.railway.app
  const BOT_API_URL = "https://bot-shoping-list-shu-production.up.railway.app";

  const tg = window.Telegram.WebApp;
  tg.ready();
  tg.expand();

  const input = document.getElementById('name');
  const btn = document.getElementById('add-btn');
  const hint = document.getElementById('hint');

  // Автофокус (на мобилке открывает клавиатуру)
  setTimeout(() => { input.focus(); }, 100);

  function updateBtn() {
    btn.disabled = input.value.trim().length === 0;
  }
  input.addEventListener('input', updateBtn);

  function setHint(text, cls) {
    hint.textContent = text;
    hint.className = 'hint' + (cls ? ' ' + cls : '');
  }

  async function submit() {
    const name = input.value.trim();
    if (!name) return;

    btn.disabled = true;
    setHint('Добавляю…');

    try {
      const res = await fetch(BOT_API_URL + '/add', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          init_data: tg.initData,
          name: name
        })
      });

      if (!res.ok) {
        const txt = await res.text();
        throw new Error('HTTP ' + res.status + ': ' + txt);
      }

      const data = await res.json();
      if (!data.ok) {
        throw new Error(data.error || 'unknown error');
      }

      setHint('✅ Добавлено!', 'success');
      // Закрываем Web App через короткую паузу, чтоб видно было успех
      setTimeout(() => tg.close(), 400);
    } catch (e) {
      console.error(e);
      setHint('Ошибка: ' + e.message, 'error');
      btn.disabled = false;
    }
  }

  btn.addEventListener('click', submit);
  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') {
      e.preventDefault();
      submit();
    }
  });
</script>

</body>
</html>
