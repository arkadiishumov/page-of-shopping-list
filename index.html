<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Добавить товар</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--tg-theme-bg-color, #ffffff);
    color: var(--tg-theme-text-color, #000000);
  }

  body {
    display: flex;
    flex-direction: column;
    padding: 24px 20px;
    min-height: 100vh;
  }

  h1 {
    font-size: 18px;
    font-weight: 600;
    margin-bottom: 20px;
    color: var(--tg-theme-text-color, #000000);
  }

  .input-wrap {
    margin-bottom: 16px;
  }

  input[type="text"] {
    width: 100%;
    padding: 14px 16px;
    font-size: 17px;
    border: 2px solid var(--tg-theme-hint-color, #cccccc);
    border-radius: 12px;
    background: var(--tg-theme-secondary-bg-color, #f4f4f5);
    color: var(--tg-theme-text-color, #000000);
    outline: none;
    -webkit-appearance: none;
  }

  input[type="text"]:focus {
    border-color: var(--tg-theme-button-color, #3390ec);
  }

  input[type="text"]::placeholder {
    color: var(--tg-theme-hint-color, #999999);
  }

  button {
    width: 100%;
    padding: 14px;
    font-size: 16px;
    font-weight: 600;
    border: none;
    border-radius: 12px;
    background: var(--tg-theme-button-color, #3390ec);
    color: var(--tg-theme-button-text-color, #ffffff);
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }

  button:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }

  button:active:not(:disabled) {
    opacity: 0.85;
  }

  .hint {
    margin-top: 14px;
    font-size: 13px;
    color: var(--tg-theme-hint-color, #888888);
    text-align: center;
  }
</style>
</head>
<body>

<h1>🛒 Новый товар</h1>

<div class="input-wrap">
  <input
    type="text"
    id="name"
    placeholder="Например: молоко"
    autofocus
    autocomplete="off"
    autocapitalize="sentences"
    maxlength="80"
  >
</div>

<button id="add-btn" disabled>Добавить</button>

<div class="hint">Нажми «Добавить» — окно закроется автоматически</div>

<script>
  const tg = window.Telegram.WebApp;

  // Подгоняем Web App под тему Telegram и разворачиваем на весь экран
  tg.ready();
  tg.expand();

  const input = document.getElementById('name');
  const btn = document.getElementById('add-btn');

  // Автофокус на поле ввода + открываем клавиатуру на мобилке
  // (autofocus в HTML не всегда срабатывает в Web App, поэтому форсируем)
  setTimeout(() => {
    input.focus();
    input.click();
  }, 100);

  // Активируем кнопку, только если что-то введено
  function updateBtn() {
    btn.disabled = input.value.trim().length === 0;
  }
  input.addEventListener('input', updateBtn);

  function submit() {
    const name = input.value.trim();
    if (!name) return;

    // Отправляем данные обратно боту в виде JSON.
    // Бот получит это в поле message.web_app_data.data
    tg.sendData(JSON.stringify({ action: 'add', name: name }));

    // Telegram сам закроет Web App после sendData,
    // но на всякий случай вызовем явно
    tg.close();
  }

  btn.addEventListener('click', submit);

  // Enter на клавиатуре = отправить
  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') {
      e.preventDefault();
      submit();
    }
  });
</script>

</body>
</html>
